<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sell Item | ReNest</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sell.css">

</head>

<body>

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Sell Form -->

    <section class="sell-page">

        <div class="sell-card">

            <h1>Sell an Item</h1>

            <form id="sellForm">

                <div class="upload-box" id="dropArea">

    <input
        type="file"
        id="imageInput"
        accept="image/*"
        hidden
    >

    <img
        id="previewImage"
        src="assets/images/upload.svg"
        alt="Upload"
    >

    <h3>Upload Product Image</h3>

    <p>

        Drag & Drop your image here

        <br>

        or

    </p>

    <button
        type="button"
        id="browseBtn"
        class="secondary">

        Browse Image

    </button>

</div>

<input
    type="text"
    id="title"
    placeholder="Product Name"
    required
>

<textarea
    id="description"
    rows="5"
    placeholder="Describe your item (condition, brand, usage, etc.)"
    required
></textarea>

<input
    type="number"
    id="price"
    placeholder="Price (₹)"
    required
>

<select
    id="category"
    required>

    <option value="">Select Category</option>

    <option>Books</option>

    <option>Electronics</option>

    <option>Furniture</option>

    <option>Cycles</option>

    <option>Accessories</option>

</select>

<select id="condition" required>

    <option value="">Select Condition</option>

    <option>Brand New</option>

    <option>Like New</option>

    <option>Good</option>

    <option>Fair</option>

</select>
<button
    type="submit"
    class="primary">

    Publish Listing

</button>

            </form>

        </div>

    </section>

    <!-- Toast -->

    <div id="toast"></div>

    <!-- Scripts -->

    <script src="js/script.js"></script>

    <script src="js/navbar.js"></script>

    <script src="js/authGuard.js"></script>

    <script src="js/sell.js"></script>

</body>

</html>
