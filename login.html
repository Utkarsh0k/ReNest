<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | ReNest</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">

</head>

<body>

    <div class="login-container">

        <div class="form-box">

            <a href="index.html">

                <img
                    src="assets/images/logo.png"
                    class="login-logo"
                    alt="ReNest Logo">

            </a>

            <h2 id="form-title">

                Welcome Back

            </h2>

            <!-- LOGIN -->

            <form id="loginForm">

                <input
                    type="email"
                    id="loginEmail"
                    placeholder="Email"
                    required>

                <input
                    type="password"
                    id="loginPassword"
                    placeholder="Password"
                    required>

                <button type="submit">

                    Login

                </button>

            </form>

            <!-- REGISTER -->

            <form
                id="registerForm"
                style="display:none;">

                <input
                    type="text"
                    id="registerName"
                    placeholder="Full Name"
                    required>

                <input
                    type="email"
                    id="registerEmail"
                    placeholder="Email"
                    required>

                <input
                    type="password"
                    id="registerPassword"
                    placeholder="Password"
                    required>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm Password"
                    required>

                <button type="submit">

                    Create Account

                </button>

            </form>

            <p id="toggleText">

                Don't have an account?

                <span id="toggleForm">

                    Register

                </span>

            </p>

            <br>

            <a
                href="index.html"
                class="secondary">

                ← Back to Home

            </a>

        </div>

    </div>

    <div id="toast"></div>

    <script src="js/script.js"></script>
    <script src="js/auth.js"></script>

</body>

</html>
