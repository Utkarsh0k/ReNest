<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Profile | ReNest</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">

</head>

<body>

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Profile -->

    <section class="profile">

        <div class="profile-card">

            <div class="avatar">

                <h1 id="avatarLetter">U</h1>

            </div>

            <h2 id="userName">

                Loading...

            </h2>

            <p id="userEmail"></p>

            <div class="stats">

                <div class="stat">

                    <h3 id="listingCount">

                        0

                    </h3>

                    <span>

                        Listings

                    </span>

                </div>

            </div>

            <button
                id="logoutBtn"
                class="logout-btn">

                Logout

            </button>

        </div>

    </section>

    <!-- Toast -->

    <div id="toast"></div>

    <!-- Scripts -->

    <script src="js/script.js"></script>

    <script src="js/navbar.js"></script>

    <script src="js/authGuard.js"></script>

    <script src="js/profile.js"></script>

</body>

</html>
