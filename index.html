<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ReWear | Campus Marketplace</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <header>

        <nav class="navbar">

            <div class="logo">

                <img src="assets/images/logo.png" alt="ReNest Logo">

                <div class="logo-text">
                    <h2>ReNest</h2>
                    <span>Campus Marketplace</span>
                </div>

            </div>

            <ul class="nav-links">

                <li><a href="#">Home</a></li>

                <li><a href="#marketplace">Marketplace</a></li>

                <li><a href="#">Sell Item</a></li>

                <li><a href="#">About</a></li>

            </ul>

            <button class="nav-btn">

                Get Started

            </button>

        </nav>
        <!-- ================= HERO ================= -->

<section class="hero">

    <div class="hero-content">

        <h1>Welcome to <span>ReNest</span></h1>

        <p>
            Buy and sell college essentials in one place.
        </p>

        <div class="hero-buttons">

            <button id="browseBtn">
                Browse Marketplace
            </button>

            <button id="sellBtn">
                Sell Item
            </button>

        </div>

    </div>

    <div class="hero-cards">

        <div class="feature-card">

            <img src="assets/images/buy.png">

            <h2>Browse Items</h2>

            <p>

                Find books, electronics,
                cycles and much more.

            </p>

        </div>

        <div class="feature-card">

            <img src="assets/images/sell.png">

            <h2>Sell Items</h2>

            <p>

                List your unused college
                essentials within minutes.

            </p>

        </div>

    </div>

</section>

    </header>

</body>

<script src="script.js"></script>

</html>
